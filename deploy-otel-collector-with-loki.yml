---
- name: Deploy OpenTelemetry Collector with Loki logs (Linux)
  hosts: all
  become: true
  gather_facts: true

  vars:
    otel_version: "0.102.1"
    otel_install_dir: "/opt/otelcol-contrib"
    otel_config_path: "/etc/otelcol-contrib/config.yaml"
    otel_service_name: "otelcol-contrib"
    otel_prom_rw_endpoint: ""
    otel_prom_rw_org_id: "anonymous"
    otel_loki_endpoint: ""
    owatch_grafana_url: ""
    monitor_metrics: true
    monitor_logs: true
    monitor_traces: false

  pre_tasks:
    - name: Require at least one pipeline (metrics or logs)
      ansible.builtin.assert:
        that:
          - (monitor_metrics | bool) or (monitor_logs | bool)
        fail_msg: "monitor_metrics 또는 monitor_logs 중 하나 이상 true 여야 합니다."

    - name: Require prometheus remote_write URL when metrics enabled
      ansible.builtin.assert:
        that:
          - otel_prom_rw_endpoint is defined
          - (otel_prom_rw_endpoint | trim | length) > 0
        fail_msg: "metrics가 켜졌지만 otel_prom_rw_endpoint가 비어 있습니다."
      when: monitor_metrics | bool

    - name: Require Loki OTLP base URL when logs enabled
      ansible.builtin.assert:
        that:
          - otel_loki_endpoint is defined
          - (otel_loki_endpoint | trim | length) > 0
        fail_msg: "logs가 켜졌지만 otel_loki_endpoint가 비어 있습니다."
      when: monitor_logs | bool

  tasks:
    - name: Ensure otel service user exists
      ansible.builtin.user:
        name: otelcol
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    # 실제 로그 파일(/var/log/syslog)을 읽기 위해 adm 그룹에 추가 (필수)
    - name: Add otelcol user to adm group for syslog access
      ansible.builtin.user:
        name: otelcol
        groups: adm
        append: true
      when: monitor_logs | bool

    - name: Ensure install and config directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - "{{ otel_install_dir }}"
        - "/etc/otelcol-contrib"

    - name: Download and Unarchive OpenTelemetry Collector
      ansible.builtin.unarchive:
        src: "https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v{{ otel_version }}/otelcol-contrib_{{ otel_version }}_linux_{{ ('amd64' if ansible_architecture in ['x86_64', 'amd64'] else 'arm64') }}.tar.gz"
        dest: "{{ otel_install_dir }}"
        remote_src: true
        owner: root
        group: root
        mode: "0755"
        extra_opts: [--overwrite]

    - name: Template collector config (metrics + Loki logs)
      ansible.builtin.template:
        src: templates/config-with-loki.yaml.j2
        dest: "{{ otel_config_path }}"
        owner: root
        group: root
        mode: "0644"
      notify: Restart otel collector

    - name: Install systemd service unit
      ansible.builtin.template:
        src: templates/otelcol-contrib.service.j2
        dest: "/etc/systemd/system/{{ otel_service_name }}.service"
        mode: "0644"
      notify: 
        - Reload systemd
        - Restart otel collector

    - name: Flush handlers before health checks
      ansible.builtin.meta: flush_handlers

    - name: Ensure otel collector service is enabled and running
      ansible.builtin.systemd:
        name: "{{ otel_service_name }}"
        enabled: true
        state: started

    - name: Wait for internal health check endpoint
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8888
        timeout: 10
      when: monitor_metrics | bool

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart otel collector
      ansible.builtin.systemd:
        name: "{{ otel_service_name }}"
        state: restarted
